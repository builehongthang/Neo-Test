<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Neo Nghề Nghiệp</title>
    <style>
        :root { 
            --primary: #4f46e5; --bg: #f3f4f6; --text: #1f2937; --card-bg: #ffffff;
            --accent: #10b981; --gold: #fbbf24;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: var(--text); display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: var(--card-bg); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #welcome-screen, #result-box { text-align: center; }
        .progress-container { height: 10px; background: #e5e7eb; border-radius: 5px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100;}
        #progress-bar { height: 100%; width: 0%; background: var(--primary); border-radius: 5px; transition: 0.3s; }
        .question-block { margin-bottom: 25px; padding: 20px; border: 1px solid #f3f4f6; border-radius: 10px; }
        .question-text { font-size: 17px; font-weight: 600; margin-bottom: 15px; display: block; color: var(--primary); }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .options label { padding: 12px 15px; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .options input { margin-right: 12px; }
        .options label.active { background: #eef2ff; border-color: var(--primary); color: var(--primary); font-weight: bold; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; margin-top: 20px; }
        
        /* --- STYLE KẾT QUẢ TỐI GIẢN --- */
        .result-item { 
            text-align: left; background: #ffffff; padding: 25px; border-radius: 12px; 
            margin-bottom: 12px; border: 1px solid #e5e7eb; position: relative; transition: 0.3s;
        }
        .result-item.top { 
            border: 2px solid var(--accent); 
            background: linear-gradient(135deg, #ffffff 0%, #f0fdf4 100%);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.15);
            transform: scale(1.02);
        }
        .top-badge {
            position: absolute; top: -12px; left: 20px;
            background: var(--accent); color: white; padding: 4px 15px;
            border-radius: 20px; font-size: 12px; font-weight: bold;
        }
        .rank-1 { background: var(--gold); color: #000; }

        .group-display { 
            font-weight: 800; 
            font-size: 19px; 
            color: #1f2937; 
            display: block; 
            line-height: 1.4;
        }
        .top .group-display { color: #065f46; font-size: 21px; }
    </style>
</head>
<body>
<div class="container">
    <div id="welcome-screen">
        <h1>⚓ Trắc Nghiệm Neo Nghề Nghiệp</h1>
        <p>Khám phá động lực cốt lõi giúp em hạnh phúc với sự nghiệp tương lai.</p>
        <button id="start-btn" class="btn btn-primary" onclick="startQuiz()" disabled>Đang tải dữ liệu...</button>
    </div>

    <div id="quiz-container" style="display:none;">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="quiz-area"></div>
        <button class="btn btn-primary" onclick="processResult()">Xem kết quả</button>
    </div>

    <div id="result-box" style="display:none;">
        <h2>📊 Kết Quả Động Lực Của Bạn</h2>
        <p>Thứ tự các nhóm động lực dựa trên điểm số của bạn:</p>
        <div id="result-list"></div>
        <br>
        <button class="btn" onclick="location.reload()" style="background:#6b7280; color:white;">Làm lại bài kiểm tra</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz7PxeIL8oQyG99YN2ownsy5zZMtKQRgJxhZEty1HFRufRG2119K7aJiFRaCVPePaqNsA/exec";
    let questions = [];

    const groups = {
        "Chuyên môn & Kỹ thuật (Technical/Functional)": [6, 14, 22],
        "Quản trị chung (General Managerial)": [2, 10, 18],
        "Tự chủ & Độc lập (Autonomy/Independence)": [4, 12, 20],
        "An toàn & Ổn định (Security/Stability)": [1, 9, 17],
        "Sáng tạo & Khởi nghiệp (Entrepreneurial Creativity)": [7, 15, 23],
        "Cống hiến & Lý tưởng (Service/Dedication)": [5, 13, 21],
        "Thử thách thuần túy (Pure Challenge)": [3, 11, 19],
        "Phong cách sống (Lifestyle)": [8, 16, 24]
    };

    async function loadQuestions() {
        try {
            const response = await fetch(API_URL);
            questions = await response.json();
            if (questions.length > 0) {
                const btn = document.getElementById('start-btn');
                btn.disabled = false;
                btn.innerText = "Bắt đầu ngay";
            }
        } catch (e) { alert("Lỗi kết nối dữ liệu Google Sheet!"); }
    }

    function startQuiz() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        const area = document.getElementById('quiz-area');
        area.innerHTML = questions.map(q => `
            <div class="question-block">
                <span class="question-text">Câu ${q.ID}: ${q.Question}</span>
                <div class="options">
                    <label id="label-${q.ID}-3"><input type="radio" name="q${q.ID}" value="3" onchange="updateUI(${q.ID}, 3)"> 😍 Rất đúng với tôi (3đ)</label>
                    <label id="label-${q.ID}-1"><input type="radio" name="q${q.ID}" value="1" onchange="updateUI(${q.ID}, 1)"> 😐 Bình thường / Tùy lúc (1đ)</label>
                    <label id="label-${q.ID}-0"><input type="radio" name="q${q.ID}" value="0" onchange="updateUI(${q.ID}, 0)"> 🤢 Không đúng với tôi (0đ)</label>
                </div>
            </div>`).join('');
    }

    function updateUI(id, score) {
        [0, 1, 3].forEach(v => {
            const el = document.getElementById(`label-${id}-${v}`);
            if(el) el.classList.remove('active');
        });
        document.getElementById(`label-${id}-${score}`).classList.add('active');
        const answered = document.querySelectorAll('input[type="radio"]:checked').length;
        document.getElementById('progress-bar').style.width = (answered / questions.length) * 100 + "%";
    }

    function processResult() {
        const selected = document.querySelectorAll('input[type="radio"]:checked');
        if (selected.length < questions.length) { alert("Vui lòng hoàn thành đủ 24 câu hỏi!"); return; }
        
        let userAnswers = {};
        selected.forEach(s => {
            const qId = s.name.replace('q', '');
            userAnswers[qId] = parseInt(s.value);
        });

        let resultScores = [];
        for (const [groupName, qIds] of Object.entries(groups)) {
            let sum = 0;
            qIds.forEach(id => { sum += userAnswers[id] || 0; });
            resultScores.push({ name: groupName, score: sum });
        }

        resultScores.sort((a, b) => b.score - a.score);

        const resultList = document.getElementById('result-list');
        resultList.innerHTML = resultScores.map((res, index) => {
            const isTop = index < 2;
            const badge = index === 0 ? '<span class="top-badge rank-1">🥇 Hạng 1</span>' : 
                          index === 1 ? '<span class="top-badge">🥈 Hạng 2</span>' : '';
            
            return `
                <div class="result-item ${isTop ? 'top' : ''}">
                    ${badge}
                    <span class="group-display">${res.name} : ${res.score} điểm</span>
                </div>
            `;
        }).join('');

        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        window.scrollTo(0, 0);
    }
    loadQuestions();
</script>
</body>
</html>
