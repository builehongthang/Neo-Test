<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Neo Nghề Nghiệp</title>
    <style>
        :root { 
            --primary: #4285f4; --secondary: #34a853; --warning: #fbbc05;
            --bg: #f0f4f8; --text: #2c3e50; --card-bg: #ffffff;
            --accent: #10b981; --gold: #fbbf24;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: var(--text); padding: 15px; box-sizing: border-box;
        }

        .container { 
            width: 100%; max-width: 700px; background: var(--card-bg); 
            padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }

        #welcome-screen { text-align: center; }
        .hero-img { font-size: 60px; margin-bottom: 20px; }
        
        #quiz-container { display: none; }
        .progress-container { height: 8px; background: #e8eaed; border-radius: 10px; margin-bottom: 20px; overflow: hidden; position: sticky; top: 0; z-index: 10;}
        #progress-bar { height: 100%; width: 0%; background: var(--secondary); transition: 0.4s; }

        .question-block { 
            margin-bottom: 25px; padding: 20px; border-radius: 15px; 
            background: #fff; border: 1px solid #eef2f7; 
        }
        .question-text { font-size: 17px; font-weight: 600; margin-bottom: 15px; display: block; color: var(--primary); }

        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-group label { 
            flex: 1; min-width: 100px; text-align: center; padding: 12px 5px; 
            border: 2px solid #dadce0; border-radius: 10px; cursor: pointer; 
            font-size: 14px; font-weight: 600; transition: 0.2s;
        }

        input[type="radio"] { display: none; }
        
        /* Màu sắc khi chọn option giống bài Holland */
        .opt-3:has(input:checked) { background: #e8f0fe; border-color: var(--primary); color: var(--primary); }
        .opt-1:has(input:checked) { background: #feefc3; border-color: var(--warning); color: #af8600; }
        .opt-0:has(input:checked) { background: #f1f3f4; border-color: #5f6368; color: #5f6368; }

        .main-btn { 
            width: 100%; padding: 18px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-size: 18px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(66,133,244,0.25);
            transition: 0.3s;
        }
        .main-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        #result-box { display: none; text-align: center; }
        .score-list { text-align: left; margin: 20px auto; max-width: 500px; }
        
        /* Hiển thị Top 2 Neo Động Lực nổi bật */
        .top-two {
            background: #f8f9fa;
            border: 2px solid var(--accent);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .top-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #dee2e6;
        }
        .top-item:last-child { border-bottom: none; }
        .top-item .rank-badge {
            background: var(--accent); color: white; 
            width: 28px; height: 28px; border-radius: 50%; 
            display: inline-flex; justify-content: center; align-items: center;
            font-size: 14px; margin-right: 12px; font-weight: bold;
        }
        .rank-1 .rank-badge { background: var(--gold); color: #000; }

        .top-item b { color: var(--text); font-size: 16px; flex: 1; }
        .top-item .score-tag { color: var(--primary); font-weight: 800; font-size: 18px; margin-left: 10px; }

        .other-scores { opacity: 0.8; font-size: 14px; }
        .score-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #ccc; }

        @media (max-width: 480px) {
            .btn-group { flex-direction: column; }
            .container { padding: 20px; }
            .top-item { flex-direction: column; align-items: flex-start; gap: 5px; }
            .top-item .score-tag { align-self: flex-end; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="welcome-screen">
        <div class="hero-img">⚓</div>
        <h1>Neo Nghề Nghiệp</h1>
        <p>Khám phá "chiếc neo" động lực giúp em hạnh phúc và gắn bó với sự nghiệp tương lai.</p>
        <button id="start-btn" class="main-btn" onclick="startQuiz()" disabled>Đang tải câu hỏi...</button>
        <p id="load-status" style="font-size: 14px; color: #888; margin-top: 10px;">Vui lòng đợi giây lát...</p>
    </div>

    <div id="quiz-container">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="quiz-area"></div>
        <button class="main-btn" onclick="calculateResult()">Xem kết quả Neo Động Lực</button>
    </div>

    <div id="result-box">
        <div class="hero-img">📊</div>
        <h2 style="color: var(--accent);">KẾT QUẢ CỦA BẠN</h2>
        <p>Hai nhóm dưới đây là những động lực cốt lõi chi phối sự nghiệp của bạn:</p>
        
        <div class="score-list">
            <div id="top-two-box" class="top-two"></div>
            
            <p style="text-align:center; font-weight:bold; color:#888; margin: 25px 0 10px 0;">Điểm chi tiết các nhóm khác</p>
            <div id="others-box" class="other-scores"></div>
        </div>

        <button class="main-btn" onclick="location.reload()" style="background:#5f6368; margin-top: 30px;">Làm lại bài kiểm tra</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz7PxeIL8oQyG99YN2ownsy5zZMtKQRgJxhZEty1HFRufRG2119K7aJiFRaCVPePaqNsA/exec";
    let questions = [];

    const groups = {
        "Chuyên môn & Kỹ thuật (Technical/Functional)": [6, 14, 22],
        "Quản trị chung (General Managerial)": [2, 10, 18],
        "Tự chủ & Độc lập (Autonomy/Independence)": [4, 12, 20],
        "An toàn & Ổn định (Security/Stability)": [1, 9, 17],
        "Sáng tạo & Khởi nghiệp (Entrepreneurial Creativity)": [7, 15, 23],
        "Cống hiến & Lý tưởng (Service/Dedication)": [5, 13, 21],
        "Thử thách thuần túy (Pure Challenge)": [3, 11, 19],
        "Phong cách sống (Lifestyle)": [8, 16, 24]
    };

    async function fetchQuestions() {
        const btn = document.getElementById('start-btn');
        const statusText = document.getElementById('load-status');
        try {
            const res = await fetch(API_URL);
            questions = await res.json();
            if (questions.length > 0) {
                btn.disabled = false;
                btn.innerText = "Bắt đầu ngay";
                statusText.innerText = "Dữ liệu đã sẵn sàng!";
                statusText.style.color = "var(--secondary)";
            }
        } catch (e) {
            statusText.innerText = "Lỗi kết nối dữ liệu Google Sheet!";
            statusText.style.color = "red";
        }
    }

    function startQuiz() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        renderQuiz();
        window.scrollTo(0, 0);
    }

    function renderQuiz() {
        const area = document.getElementById('quiz-area');
        area.innerHTML = questions.map((q, index) => `
            <div class="question-block">
                <span class="question-text">Câu ${q.ID}: ${q.Question}</span>
                <div class="btn-group">
                    <label class="opt-3">
                        <input type="radio" name="q${q.ID}" value="3" onchange="updateProgress()"> 😍 Rất đúng
                    </label>
                    <label class="opt-1">
                        <input type="radio" name="q${q.ID}" value="1" onchange="updateProgress()"> 😐 Bình thường
                    </label>
                    <label class="opt-0">
                        <input type="radio" name="q${q.ID}" value="0" onchange="updateProgress()"> 🤢 Không đúng
                    </label>
                </div>
            </div>`).join('');
    }

    function updateProgress() {
        const answered = document.querySelectorAll('input[type="radio"]:checked').length;
        document.getElementById('progress-bar').style.width = (answered / questions.length) * 100 + "%";
    }

    function calculateResult() {
        const selected = document.querySelectorAll('input[type="radio"]:checked');
        if (selected.length < questions.length) {
            alert("Em hãy hoàn thành nốt các câu còn lại nhé!");
            return;
        }

        let userAnswers = {};
        selected.forEach(s => {
            const qId = s.name.replace('q', '');
            userAnswers[qId] = parseInt(s.value);
        });

        let resultScores = [];
        for (const [groupName, qIds] of Object.entries(groups)) {
            let sum = 0;
            qIds.forEach(id => { sum += userAnswers[id] || 0; });
            resultScores.push({ name: groupName, score: sum });
        }

        resultScores.sort((a, b) => b.score - a.score);

        // Hiển thị Top 2
        let topTwoHtml = "";
        for (let i = 0; i < 2; i++) {
            topTwoHtml += `
                <div class="top-item ${i === 0 ? 'rank-1' : ''}">
                    <span><span class="rank-badge">${i === 0 ? '🥇' : '🥈'}</span> <b>${resultScores[i].name}</b></span>
                    <span class="score-tag">${resultScores[i].score} điểm</span>
                </div>`;
        }
        document.getElementById('top-two-box').innerHTML = topTwoHtml;

        // Hiển thị các nhóm còn lại
        let othersHtml = "";
        for (let i = 2; i < resultScores.length; i++) {
            othersHtml += `
                <div class="score-item">
                    <span>${resultScores[i].name}</span>
                    <span><b>${resultScores[i].score} điểm</b></span>
                </div>`;
        }
        document.getElementById('others-box').innerHTML = othersHtml;

        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        window.scrollTo(0, 0);
    }

    fetchQuestions();
</script>
</body>
</html>
